        .logo-container {

            margin-block-end: 0.5rem;
        }
        .auth-subtitle {
            color: #64748b;
            margin-block-end: 2rem;
        }
        .oauth-buttons {
            display: grid;
            gap: 0.75rem;
            margin-block-end: 2rem;
        }
        .btn-oauth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;

            color: #1e293b;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-oauth:hover {
            border-color: #2563eb;
            background: #f8fafc;
            color: #1e293b;
        }
        .btn-oauth svg {
            inline-size: 20px;
            block-size: 20px;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-block-end: 1px solid #e2e8f0;
        }
        .divider span {
            padding: 0 1rem;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
            margin-block-end: 0.5rem;
        }
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn-primary {
            inline-size: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }
        .auth-footer {
            text-align: center;
            margin-block-start: 1.5rem;
            color: #64748b;
        }
        .auth-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#d4af37"/>
                        <stop offset="100%" style="stop-color:#f4d03f"/>
                    </linearGradient>
                </defs>
                <path d="M30 55 L40 45 L50 60 L70 35" stroke="url(#logoGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="70" cy="35" r="6" fill="#d4af37"/>
            </svg>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Sign in to your SmartInvest account</p>
        </div>

        <!-- Login Method Selection -->
        <div class="login-method-selector mb-4">
            <div class="text-center mb-3">
                <h6 class="text-muted mb-3">Choose your login method</h6>
                <div class="btn-group w-100" role="group" aria-label="Login method selection">
                    <input type="radio" class="btn-check" name="loginMethod" id="emailMethod" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="emailMethod">
                        <i class="fas fa-envelope me-2"></i>Email
                    </label>

                    <input type="radio" class="btn-check" name="loginMethod" id="phoneMethod" autocomplete="off">
                    <label class="btn btn-outline-primary" for="phoneMethod">
                        <i class="fas fa-phone me-2"></i>Phone
                    </label>

                    <input type="radio" class="btn-check" name="loginMethod" id="idMethod" autocomplete="off">
                    <label class="btn btn-outline-primary" for="idMethod">
                        <i class="fas fa-id-card me-2"></i>ID Number
                    </label>
                </div>
            </div>
        </div>

        <!-- OAuth Buttons -->
        <div class="oauth-buttons">
            <button class="btn-oauth" onclick="signInWith('google')">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>

            <button class="btn-oauth" onclick="signInWith('phone_number')">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                Continue with Phone number
            </button>

            <button class="btn-oauth" onclick="signInWith('ID number')">
                <svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/><path d="M0 0h24v24H0V0z" fill="none"/></svg>
                Continue with ID number
            </button>
        </div>

        <div class="divider">
            <span>Or continue with credentials</span>
        </div>

        <!-- Dynamic Login Form -->
        <form id="loginForm">
            <!-- Email Login Fields -->
            <div id="emailFields" class="login-fields">
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                </div>
            </div>

            <!-- Phone Login Fields -->
            <div id="phoneFields" class="login-fields" style="display: none;">
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="+254 700 000 000" required>
                </div>
            </div>

            <!-- ID Number Login Fields -->
            <div id="idFields" class="login-fields" style="display: none;">
                <div class="mb-3">
                    <label for="idNumber" class="form-label">ID Number</label>
                    <input type="text" class="form-control" id="idNumber" placeholder="12345678" required>
                </div>
            </div>

            <!-- Common Password Field -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>

            <div class="mb-3 text-end">
                <a href="/forgot-password.html" class="text-decoration-none" style="color: #2563eb; font-size: 0.875rem;">Forgot password?</a>
            </div>

            <!-- CAPTCHA for login -->
            <div class="mb-3" id="captchaContainer" style="display: none;">
                <div class="h-captcha" data-sitekey="YOUR_HCAPTCHA_SITEKEY"></div>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="adminFlag">
                <label class="form-check-label" for="adminFlag">Login as administrator</label>
            </div>

            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="auth-footer">
            <p class="mb-0">Don't have an account? <a href="/signup.html">Sign up</a></p>
            <p class="mt-2 small text-muted">🛡️ POPIA, GDPR, NDPR, Kenya DPA compliant</p>
        </div>
    <main>
    </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/auth.js"></script>
    <script>
        // Login method selection handler
        function handleLoginMethodChange() {
            const selectedMethod = document.querySelector('input[name="loginMethod"]:checked').id;

            // Hide all field groups
            document.querySelectorAll('.login-fields').forEach(field => {
                field.style.display = 'none';
                // Clear required attributes and values
                const inputs = field.querySelectorAll('input');
                inputs.forEach(input => {
                    input.required = false;
                    input.value = '';
                });
            });

            // Show selected field group and set required
            let activeField;
            if (selectedMethod === 'emailMethod') {
                activeField = document.getElementById('emailFields');
            } else if (selectedMethod === 'phoneMethod') {
                activeField = document.getElementById('phoneFields');
            } else if (selectedMethod === 'idMethod') {
                activeField = document.getElementById('idFields');
            }

            if (activeField) {
                activeField.style.display = 'block';
                const input = activeField.querySelector('input');
                if (input) input.required = true;
            }
        }

        // Initialize login method selection
        document.addEventListener('DOMContentLoaded', function() {
            // Add event listeners to radio buttons
            document.querySelectorAll('input[name="loginMethod"]').forEach(radio => {
                radio.addEventListener('change', handleLoginMethodChange);
            });

            // Initialize with email selected
            handleLoginMethodChange();
        });

        // redirect if already authenticated
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = user.isAdmin ? '/admin.html' : '/dashboard.html';
            }
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const selectedMethod = document.querySelector('input[name="loginMethod"]:checked').id;
            const password = document.getElementById('password').value;
            const isAdmin = document.getElementById('adminFlag').checked;

            let loginData = { password, isAdmin };

            // Get the appropriate identifier based on selected method
            if (selectedMethod === 'emailMethod') {
                loginData.email = document.getElementById('email').value;
            } else if (selectedMethod === 'phoneMethod') {
                loginData.phone = document.getElementById('phone').value;
            } else if (selectedMethod === 'idMethod') {
                loginData.idNumber = document.getElementById('idNumber').value;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData),
                });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || 'Login failed');

                // token is returned and cookie set
                if (result.user?.isAdmin) {
                    window.location.href = '/admin.html';
                } else {
                    window.location.href = '/dashboard.html';
                }
            } catch (err) {
                alert('Sign in failed: ' + err.message);
            }
        });
    </script>
</body>
</html>
