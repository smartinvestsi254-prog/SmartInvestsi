apiVersion: v1
kind: Namespace
metadata:
  name: smartinvest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-nginx
  namespace: smartinvest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-nginx
  template:
    metadata:
      labels:
        app: test-nginx
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: test-service
  namespace: smartinvest
spec:
  selector:
    app: test-nginx
  ports:
    - port: 80
      targetPort: 80
