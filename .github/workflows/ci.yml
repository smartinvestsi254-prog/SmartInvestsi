name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vscode/**'
      - '.devcontainer/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.vscode/**'
      - '.devcontainer/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # SmartInvestsi
  # ============================================
  smartinvestsi-validate:
    name: SmartInvestsi - Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npm run prisma:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/smartinvestsi' }}

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://localhost:5432/smartinvestsi' }}

      - name: Test
        run: npm test

  # ============================================
  # SmartGovern
  # ============================================
  smartgovern-validate:
    name: SmartGovern - Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./SmartGovern

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./SmartGovern/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma Generate
        run: npm run prisma:generate
        env:
          DATABASE_URL: ${{ secrets.SMARTGOVERN_DATABASE_URL || 'postgresql://localhost:5432/smartgovern' }}

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.SMARTGOVERN_DATABASE_URL || 'postgresql://localhost:5432/smartgovern' }}

      - name: Test
        run: npm test

  # ============================================
  # Deploy (main only, not on PRs)
  # ============================================
  deploy:
    name: Deploy
    needs: [smartinvestsi-validate, smartgovern-validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy SmartInvestsi to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: .
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy SmartInvestsi from GitHub Actions"
          enable-commit-comment: true
          alias: smartinvestsi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_SMARTINVESTSI }}
        timeout-minutes: 5

      - name: Deploy SmartGovern to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./SmartGovern
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy SmartGovern from GitHub Actions"
          enable-commit-comment: true
          alias: smartgovern
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_SMARTGOVERN }}
        timeout-minutes: 5