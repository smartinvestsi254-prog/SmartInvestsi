<!DOCTYPE html>
<html>
<head>
  <title>SmartInvest Crypto Trading</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>Crypto Trading Dashboard</h1>
    <div class="row">
      <div class="col-md-8">
        <!-- TradingView Widget -->
        <div id="tradingview_12345"></div>
      </div>
  <div class="col-md-4">
    <!-- Education Ellipse -->
    <div class="card mb-3 rounded-pill p-4" style="background: linear-gradient(45deg, #667eea, #764ba2); color: white;">
      <h6>How to Read Signals</h6>
      <p>RSI <30: <i class="fas fa-arrow-up text-success"></i> Bullish Buy</p>
      <p>RSI >70: <i class="fas fa-arrow-down text-danger"></i> Bearish Sell</p>
      <img src="/images/signal-chart.png" alt="Signal Chart" class="img-fluid rounded mt-2" style="max-height:100px;">
      <small>Admin: Upload via /admin/crypto-edu</small>
    </div>

        <div class="card">
          <div class="card-header">
            Live Signals (BTC/USDT)
          </div>
          <div class="card-body" id="signals">
            Loading signals...
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-header">Portfolio P&L</div>
          <div class="card-body">
            <div id="portfolio"></div>
          </div>
        </div>
        <div class="card mt-3">
          <div class="card-header">Buy/Sell</div>
          <div class="card-body">
            <input id="amount" placeholder="Amount USDT" class="form-control mb-2">
            <select id="side" class="form-control mb-2">
              <option value="buy">Buy</option>
              <option value="sell">Sell</option>
            </select>
            <button onclick="executeOrder('BTCUSDT')" class="btn btn-success w-100">Trade</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let chart;

    new TradingView.widget({
      "container_id": "tradingview_12345",
      "width": "100%",
      "height": 500,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "5",
      "timezone": "Etc/UTC",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#f1f3f6",
      "enable_publishing": false,
      "hide_top_toolbar": false,
      "hide_legend": false,
      "save_image": false,
      "container_id": "tradingview_12345"
    });

    // Live signals
    async function loadSignals() {
      const res = await fetch('/.netlify/functions/ai-signals');
      const data = await res.json();
      const btc = data.data.find((s: any) => s.symbol.includes('BTC'));
      document.getElementById('signals').innerHTML = `
        <p><strong>AI Signal:</strong> <span class="badge bg-${btc.recommendation === 'BUY' ? 'success' : btc.recommendation === 'SELL' ? 'danger' : 'warning'}">${btc.recommendation}</span> (${(btc.confidence*100).toFixed(0)}%)</p>
        <p>Price: $${btc.price}</p>
        <p>RSI: ${btc.rsi}</p>
        <p><small>${btc.reasoning}</small></p>
      `;
    }

    // Portfolio
    async function loadPortfolio() {
      const userId = localStorage.getItem('userId') || 'demo';
      const res = await fetch('/.netlify/functions/advanced-banking/banking/assets', {
        headers: {'x-user-id': userId}
      });
      const data = await res.json();
      document.getElementById('portfolio').innerHTML = data.data.map(a => `<p>${a.symbol}: ${a.quantity} (${a.valueUSD.toFixed(2)} USD)</p>`).join('');
    }

    // Execute trade
    async function executeOrder(symbol) {
      const amount = document.getElementById('amount').value;
      const side = document.getElementById('side').value;
      const userId = localStorage.getItem('userId') || 'demo';

      const res = await fetch('/.netlify/functions/crypto-trade-api/crypto/trade', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'x-user-id': userId},
        body: JSON.stringify({symbol, side, amount: parseFloat(amount)})
      });
      const data = await res.json();
      alert(data.success ? 'Trade executed!' : data.error);
      loadPortfolio();
    }

    // Load on start
    loadSignals();
    loadPortfolio();
    setInterval(loadSignals, 30000); // 30s update

    // Alerts for signals
    if (signal === 'BULLISH') new Notification('Bullish BTC!');
  </script>
</body>
</html>
