<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Confirmation - SmartInvestsi</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; min-height:100vh; background: linear-gradient(135deg,#1a365d 0%,#2563eb 100%); display:flex; align-items:center; justify-content:center; padding:1rem; }
        .auth-container { background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-inline-size:450px;inline-size:100%;padding:3rem 2.5rem; }
        .btn-primary { inline-size:100%;padding:.75rem;border-radius:8px;font-weight:600;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none; }
        .btn-primary:hover { background:linear-gradient(135deg,#1d4ed8,#1e40af); }
    </style>
</head>
<body>
    <div class="auth-container text-center">
        <h2 class="mb-3">Confirm Your Email</h2>
        <p id="message">Validating token...</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const msg = document.getElementById('message');
        (async () => {
            if (!token) { msg.textContent = 'Invalid confirmation link.'; return; }
            try {
                const res = await fetch('/api/auth/confirm-email', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ token })
                });
                const body = await res.json();
                if (res.ok) {
                    msg.textContent = 'Email confirmed successfully! You may now login.';
                } else {
                    msg.textContent = 'Error: ' + (body.error || 'Unable to confirm email');
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
            }
        })();
    </script>
</body>
</html>
