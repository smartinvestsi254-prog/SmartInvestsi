<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Market Data</title>
    <style>
        /* Base Styles simulating TradingView's clean interface */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa; 
            color: #131722; 
            margin: 0; 
            padding: 40px 20px; 
        }

        /* Container */
        .market-container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: #ffffff; 
            border-radius: 8px; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.04); 
            border: 1px solid #e0e3eb;
            overflow: hidden; 
        }

        /* Header */
        .header { 
            padding: 24px 32px; 
            border-bottom: 1px solid #e0e3eb; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { 
            margin: 0; 
            font-size: 22px; 
            color: #131722; 
            font-weight: 700;
        }
        .header p {
            color: #787b86; 
            margin: 4px 0 0 0; 
            font-size: 14px; 
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #089981;
            font-weight: 600;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #089981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(8, 153, 129, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(8, 153, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(8, 153, 129, 0); }
        }

        /* Table Styles */
        .table-responsive { overflow-x: auto; }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: right; 
        }
        th, td { 
            padding: 16px 32px; 
            border-bottom: 1px solid #e0e3eb; 
            white-space: nowrap;
        }
        /* Left-align the first column (Asset name) */
        th:first-child, td:first-child { text-align: left; }
        
        th { 
            background-color: #ffffff; 
            font-weight: 600; 
            color: #787b86; 
            font-size: 12px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }
        td { 
            font-size: 14px; 
            font-weight: 500; 
            color: #131722;
        }
        
        /* Hover effect for rows */
        tbody tr:hover { background-color: #f8f9fa; transition: background-color 0.2s ease; }

        /* Custom cell formatting */
        .coin-name { 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .coin-name img { width: 24px; height: 24px; border-radius: 50%; }
        .symbol { color: #787b86; font-size: 13px; font-weight: 400; text-transform: uppercase; margin-left: 4px; }
        .positive { color: #089981; }
        .negative { color: #f23645; }
        
        .loading { padding: 60px; text-align: center; color: #787b86; font-size: 15px;}
    </style>
</head>
<body>

<div class="market-container">
    <div class="header">
        <div>
            <h2>Cryptocurrency Coverage</h2>
            <p>Real-time top assets by market capitalization</p>
        </div>
        <div class="live-indicator">
            <div class="dot"></div>
            LIVE DATA
        </div>
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Asset</th>
                    <th>Price (USD)</th>
                    <th>24h Change</th>
                    <th>Market Cap</th>
                    <th>24h Volume</th>
                </tr>
            </thead>
            <tbody id="crypto-table-body">
                <tr><td colspan="5" class="loading">Fetching real-time market data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Configuration
    const API_URL = 'https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=15&page=1&sparkline=false';
    const REFRESH_INTERVAL = 60000; // Refresh data every 60 seconds

    // Fetch data from CoinGecko
    async function fetchCryptoData() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('crypto-table-body').innerHTML = `
                <tr><td colspan="5" style="text-align: center; color: #f23645; padding: 40px;">
                    Failed to load data from CoinGecko. Please try again later.
                </td></tr>`;
        }
    }

    // Format numbers to clean currency strings
    function formatCurrency(value) {
        // Use more decimal places for very cheap coins
        const minDecimals = value < 1 ? 4 : 2;
        const maxDecimals = value < 1 ? 6 : 2;
        return new Intl.NumberFormat('en-US', { 
            style: 'currency', 
            currency: 'USD', 
            minimumFractionDigits: minDecimals, 
            maximumFractionDigits: maxDecimals 
        }).format(value);
    }

    // Format large numbers (e.g. Billions, Millions)
    function formatCompact(value) {
        return new Intl.NumberFormat('en-US', { 
            style: 'currency', 
            currency: 'USD', 
            notation: "compact", 
            maximumFractionDigits: 2 
        }).format(value);
    }

    // Render the table HTML
    function renderTable(coins) {
        const tbody = document.getElementById('crypto-table-body');
        tbody.innerHTML = ''; // Clear loading text

        coins.forEach(coin => {
            // Determine colors and signs for 24h change
            const isPositive = coin.price_change_percentage_24h >= 0;
            const priceChangeClass = isPositive ? 'positive' : 'negative';
            const priceChangeSign = isPositive ? '+' : '';
            const priceChange = coin.price_change_percentage_24h ? coin.price_change_percentage_24h.toFixed(2) : '0.00';

            // Create table row
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>
                    <div class="coin-name">
                        <img src="${coin.image}" alt="${coin.name} logo">
                        <strong>${coin.name}</strong>
                        <span class="symbol">${coin.symbol}</span>
                    </div>
                </td>
                <td>${formatCurrency(coin.current_price)}</td>
                <td class="${priceChangeClass}">${priceChangeSign}${priceChange}%</td>
                <td>${formatCompact(coin.market_cap)}</td>
                <td>${formatCompact(coin.total_volume)}</td>
            `;
            tbody.appendChild(row);
        });
    }

    // Initialize fetching and set auto-refresh interval
    fetchCryptoData();
    setInterval(fetchCryptoData, REFRESH_INTERVAL);
</script>

</body>
</html>
