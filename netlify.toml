[build]
command = "npm run build"
publish = "dist"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"
NODE_ENV = "production"
NPM_CONFIG_PRODUCTION = "false"

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# API Gateway -> Express Handler

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/server/:splat"
status = 200
force = true

# Dashboard Routes

[[redirects]]
from = "/dashboard"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/admin"
to = "/admin.html"
status = 200

[[redirects]]
from = "/portfolio"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/trading"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/earn"
to = "/dashboard.html"
status = 200

[[redirects]]
from = "/referrals"
to = "/dashboard.html"
status = 200

# SPA Fallback

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Global Security Headers

[[headers]]
for = "/*"

[headers.values]
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"
X-XSS-Protection = "1; mode=block"
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Resource-Policy = "same-origin"

# API Headers

[[headers]]
for = "/api/*"

[headers.values]
Content-Type = "application/json"
Cache-Control = "no-store"

# Static Assets Caching

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Images

[[headers]]
for = "/*.png"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.jpg"

[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/*.svg"

[headers.values]
Cache-Control = "public, max-age=604800"
