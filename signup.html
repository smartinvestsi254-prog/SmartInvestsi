<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SmartInvestsi</title>
    <meta name="description" content="Create your SmartInvestsi account">
    <meta name="robots" content="noindex, nofollow">
    <meta name="google-site-verification" content="PGl8tnEo0cLmNeSByTMPH8DWktC-VI4J_cReUfG0Hdk" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%231a365d'/%3E%3Cstop offset='100%25' style='stop-color:%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' fill='url(%23g)'/%3E%3Cpath d='M30 55 L40 45 L50 60 L70 35' stroke='%23d4af37' stroke-width='4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='70' cy='35' r='3' fill='%23d4af37'/%3E%3C/svg%3E">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-block-size: 100vh;
            background: linear-gradient(135deg, #1a365d 0%, #2563eb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .auth-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-inline-size: 450px;
            inline-size: 100%;
            padding: 3rem 2.5rem;
        }
        .logo-container {
            text-align: center;
            margin-block-end: 2rem;
        }
        .logo-svg {
            inline-size: 60px;
            block-size: 60px;
            margin-block-end: 1rem;
        }
        .auth-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a365d;
            margin-block-end: 0.5rem;
        }
        .auth-subtitle {
            color: #64748b;
            margin-block-end: 2rem;
        }
        .oauth-buttons {
            display: grid;
            gap: 0.75rem;
            margin-block-end: 2rem;
        }
        .btn-oauth {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-weight: 600;
            color: #1e293b;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-oauth:hover {
            border-color: #2563eb;
            background: #f8fafc;
            color: #1e293b;
        }
        .btn-oauth svg {
            inline-size: 20px;
            block-size: 20px;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
            color: #94a3b8;
            font-size: 0.875rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-block-end: 1px solid #e2e8f0;
        }
        .divider span {
            padding: 0 1rem;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
            margin-block-end: 0.5rem;
        }
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .btn-primary {
            inline-size: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1d4ed8, #1e40af);
        }
        .auth-footer {
            text-align: center;
            margin-block-start: 1.5rem;
            color: #64748b;
        }
        .auth-footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .form-check-label {
            font-size: 0.875rem;
            color: #64748b;
        }
        .form-check-label a {
            color: #2563eb;
            text-decoration: none;
        }
        .form-check-label a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#d4af37"/>
                        <stop offset="100%" style="stop-color:#f4d03f"/>
                    </linearGradient>
                </defs>
                <path d="M30 55 L40 45 L50 60 L70 35" stroke="url(#logoGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="70" cy="35" r="6" fill="#d4af37"/>
            </svg>
            <h1 class="auth-title">Create your account</h1>
            <p class="auth-subtitle">Join thousands of African investors</p>
        </div>

        <!-- OAuth Buttons -->
        <div class="oauth-buttons">
            <button class="btn-oauth" onclick="signUpWith('google')">
                <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Continue with Google
            </button>
            
            <button class="btn-oauth" onclick="signUpWith('microsoft')">
                <svg viewBox="0 0 24 24"><path fill="#f25022" d="M0 0h11.377v11.372H0z"/><path fill="#00a4ef" d="M12.623 0H24v11.372H12.623z"/><path fill="#7fba00" d="M0 12.623h11.377V24H0z"/><path fill="#ffb900" d="M12.623 12.623H24V24H12.623z"/></svg>
                Continue with Microsoft
            </button>
        </div>

        <div class="divider">
            <span>Or sign up with email</span>
        </div>

        <!-- Email/Password Form -->
        <form id="signupForm">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required minlength="8">
                <small class="text-muted">At least 8 characters</small>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="+27 11 123 4567" required>
                <small class="text-muted">For account verification and support</small>
            </div>
            <div class="mb-3">
                <label for="country" class="form-label">Country</label>
                <select class="form-control" id="country" required>
                    <option value="">Select your country</option>
                    <option value="ZA">South Africa</option>
                    <option value="KE">Kenya</option>
                    <option value="NG">Nigeria</option>
                    <option value="GH">Ghana</option>
                    <option value="TZ">Tanzania</option>
                    <option value="UG">Uganda</option>
                    <option value="ZW">Zimbabwe</option>
                    <option value="BW">Botswana</option>
                    <option value="ZM">Zambia</option>
                    <option value="MZ">Mozambique</option>
                    <option value="NA">Namibia</option>
                    <option value="AO">Angola</option>
                    <option value="RW">Rwanda</option>
                    <option value="ET">Ethiopia</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="bankName" class="form-label">Bank Name</label>
                <input type="text" class="form-control" id="bankName" placeholder="e.g., FNB, KCB, GTBank" required>
            </div>
            <div class="mb-3">
                <label for="accountNumber" class="form-label">Account Number</label>
                <input type="text" class="form-control" id="accountNumber" placeholder="Your bank account number" required>
                <small class="text-muted">For payment processing and withdrawals</small>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    I agree to the <a href="/terms.html">Terms of Service</a> and <a href="/privacy.html">Privacy Policy</a>
                </label>
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <div class="auth-footer">
            <p class="mb-0">Already have an account? <a href="/login.html">Sign in</a></p>
            <p class="mt-2 small text-muted">🛡️ POPIA, GDPR, NDPR, Kenya DPA compliant</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/auth.js"></script>
    <script>
        // redirect if already authenticated
        (async () => {
            const user = await getCurrentUser();
            if (user) {
                window.location.href = user.isAdmin ? '/admin.html' : '/dashboard.html';
            }
        })();

        // Email/Password Sign Up using backend
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                country: document.getElementById('country').value,
                bankName: document.getElementById('bankName').value,
                accountNumber: document.getElementById('accountNumber').value,
                acceptTerms: document.getElementById('terms').checked,
            };
            try {
                const res = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const result = await res.json();
                if (!res.ok) throw new Error(result.error || 'Signup failed');
                // server already set cookie; redirect
                alert('Registration successful!');
                window.location.href = '/dashboard.html';
            } catch (err) {
                alert('Sign up failed: ' + err.message);
            }
        });
    </script>
</body>
</html>
