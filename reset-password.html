<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - SmartInvestsi</n    <meta name="robots" content="noindex, nofollow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter',sans-serif; min-height:100vh; background: linear-gradient(135deg,#1a365d 0%,#2563eb 100%); display:flex; align-items:center; justify-content:center; padding:1rem; }
        .auth-container { background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);max-inline-size:450px;inline-size:100%;padding:3rem 2.5rem; }
        .form-label { font-weight:600;color:#334155;margin-block-end:.5rem; }
        .form-control { padding:.75rem 1rem;border-radius:8px;border:2px solid #e2e8f0;transition:border-color .2s; }
        .form-control:focus { border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1); }
        .btn-primary { inline-size:100%;padding:.75rem;border-radius:8px;font-weight:600;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none; }
        .btn-primary:hover { background:linear-gradient(135deg,#1d4ed8,#1e40af); }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2 class="mb-3">Choose a new password</h2>
        <div id="message" class="mb-3"></div>
        <form id="resetPwdForm">
            <div class="mb-3">
                <label class="form-label" for="password">New password</label>
                <input id="password" type="password" class="form-control" required minlength="8">
            </div>
            <button class="btn btn-primary" type="submit">Update password</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const msgEl = document.getElementById('message');

        document.getElementById('resetPwdForm').addEventListener('submit', async e => {
            e.preventDefault();
            if (!token) return;
            const newPassword = document.getElementById('password').value;
            try {
                const res = await fetch('/api/auth/password-reset/confirm', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ token, newPassword })
                });
                const body = await res.json();
                if (!res.ok) throw new Error(body.error || 'Failed');
                msgEl.textContent = 'Password updated – you may now sign in.';
            } catch (err) {
                msgEl.textContent = 'Error: '+err.message;
            }
        });
    </script>
</body>
</html>
